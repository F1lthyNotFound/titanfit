name: titanfit
description: Titan Labs member app — runtime gym flavoring from tenant branding.
publish_to: "none"
version: 0.2.1+3

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  shared_preferences: ^2.3.3
  cached_network_image: ^3.4.1
  go_router: ^14.6.2
  flutter_svg: ^2.0.10+1
  image_picker: ^1.1.2
  image: ^4.5.4
  http_parser: ^4.1.2
  qr_flutter: ^4.1.0
  url_launcher: ^6.3.1
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/gym_slug.json
